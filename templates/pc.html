<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <title>VocalBook</title>
        <link rel="stylesheet" href="/static/css/layout.css">
        <link rel="stylesheet" href="/static/css/pc.css">
    </head>
    <body>
        <!-- 页面整体 -->
        <div class="page-wrapper">
            <!-- Header -->
            <header class="site-header">
                <div class="header-content">
                    <h1 class="logo">VocalBook</h1>
                </div>
            </header>

            <!-- 主体内容 -->
            <main class="main-content">
                <!-- 核心容器 -->
                <div class="content-card">
                    <!-- 上板块 -->
                    <div class="word-info-section">
                        <!-- 左半部分 英文单词+音标 -->
                        <div class="word-phonetic-wrap">
                            <p class="word">author</p>
                            <p class="phonetic">/ˈɔːθə(r)/</p>
                        </div>
                        <!-- 右半部分 释义 -->
                        <div class="meaning-wrap">
                            <p class="meaning-item">n. 著作家,作者;创始人,发起者</p>
                        </div>
                    </div>

                    <!-- 分隔线 -->
                    <div class="section-divider"></div>

                    <!-- 下板块 例句 -->
                    <div class="example-section">
                        <p class="example-en">He is a famous author who has written many books.</p>
                        <p class="example-zh">他是一位写过很多书的著名作家。</p>
                    </div>
                </div>
            </main>

            <!-- Footer -->
            <footer class="site-footer">
                <div class="footer-content">
                    <p>项目地址</p>
                </div>
            </footer>
        </div>
    </body>
</html>
