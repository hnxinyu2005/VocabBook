<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8">
        <title>VocalBook</title>
        <link rel="stylesheet" href="/app/web/static/css/layout.css">
        <link rel="stylesheet" href="/app/web/static/css/pc.css">
    </head>
    <body>
        <!-- 页面整体 -->
        <div class="page-wrapper">
            <!-- Header -->
            <header class="site-header">
                <div class="header-content">
                    <h1 class="logo">VocalBook</h1>
                </div>
            </header>

            <!-- 主体内容 -->
            <main class="main-content">
                <!-- 核心容器 -->
                <div class="content-card">
                    <!-- 上板块 -->
                    <div class="word-info-section">
                        <!-- 左半部分  -->
                        <div class="word-phonetic-wrap">
                            <p class="word">author</p>
                            <p class="phonetic">/ˈɔːθə(r)/</p>

                            <div class="exam-stats">
                                <span class="stats-item">考察次数：12 次</span>
                                <span class="stats-item">正确率：85%</span>
                            </div>
                        </div>
                        <!-- 右半部分 -->
                        <div class="meaning-wrap">
                            <p class="meaning-item">n. 著作家,作者;创始人,发起者</p>

                            <div class="last-exam-time">
                                <span class="label">上一次考察时间：</span>
                                <span class="time">2026-03-09 14:30</span>
                            </div>
                        </div>
                    </div>

                    <!-- 分隔线 -->
                    <div class="section-divider"></div>

                    <!-- 下板块 例句 -->
                    <div class="example-section">
                        <p class="example-en">He is a famous author who has written many books.</p>
                        <p class="example-zh">他是一位写过很多书的著名作家。</p>
                        <!-- 书籍来源 -->
                        <div class="book-source">
                            来自于新东方《四级词汇》 Unit1
                        </div>
                    </div>
                </div>
            </main>

            <!-- Footer -->
            <footer class="site-footer">
                <div class="footer-content">
                    <p>项目地址</p>
                </div>
            </footer>
        </div>
    </body>
</html>
